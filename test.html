<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Oliver - Tutor de Inglés</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #1e3c72;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            height: 600px;
        }
        .header {
            background: #2a5298;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .user-message {
            justify-content: flex-end;
        }
        .bot-message {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            line-height: 1.4;
        }
        .user-message .bubble {
            background: #2a5298;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot-message .bubble {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }
        .sender {
            font-size: 11px;
            margin-bottom: 4px;
            color: #666;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        button {
            margin-left: 10px;
            padding: 12px 24px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #1e3c72;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            padding: 8px;
            text-align: center;
            font-size: 12px;
            background: #f0f0f0;
            color: #666;
        }
        .error {
            color: #d32f2f;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <h1>🇬🇧 Professor Oliver 🇬🇧</h1>
        <p>Your British English Tutor</p>
    </div>
    <div class="messages" id="messages">
        <div class="message bot-message">
            <div>
                <div class="sender">Professor Oliver</div>
                <div class="bubble">Hello! I'm Oliver, your British English tutor. What's your name? 🇬🇧</div>
            </div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message in English..." autocomplete="off">
        <button id="sendButton">Send</button>
    </div>
    <div class="status" id="status">✅ Ready</div>
</div>

<script>
    // Configuración
    const API_URL = 'https://profe-ingles.onrender.com/chat';
    
    // Elementos
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const statusDiv = document.getElementById('status');
    
    // Historial
    let conversationHistory = [];
    
    // Función para agregar mensaje
    function addMessage(role, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
        
        const sender = document.createElement('div');
        sender.className = 'sender';
        sender.textContent = role === 'user' ? 'You' : 'Professor Oliver';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        
        messageDiv.appendChild(sender);
        messageDiv.appendChild(bubble);
        messagesDiv.appendChild(messageDiv);
        
        // Auto-scroll
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    // Función para enviar mensaje
    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;
        
        // Limpiar input y deshabilitar botón
        messageInput.value = '';
        sendButton.disabled = true;
        statusDiv.textContent = '🤔 Professor Oliver is thinking...';
        statusDiv.classList.remove('error');
        
        // Mostrar mensaje del usuario
        addMessage('user', message);
        conversationHistory.push({ role: 'user', content: message });
        
        try {
            console.log('Enviando a:', API_URL);
            console.log('Mensaje:', message);
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    userMessage: message,
                    conversationHistory: conversationHistory.slice(0, -1)
                })
            });
            
            console.log('Respuesta status:', response.status);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            console.log('Respuesta data:', data);
            
            const reply = data.reply || "Professor Oliver is having tea. Try again!";
            
            addMessage('bot', reply);
            conversationHistory.push({ role: 'assistant', content: reply });
            
            statusDiv.textContent = '✅ Ready';
        } catch (error) {
            console.error('Error detallado:', error);
            statusDiv.textContent = '❌ Connection error. Check console for details.';
            statusDiv.classList.add('error');
            addMessage('bot', "Sorry, I'm having trouble connecting. Please try again in a moment! - Oliver");
        } finally {
            sendButton.disabled = false;
            messageInput.focus();
        }
    }
    
    // Event listeners
    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    // Focus inicial
    messageInput.focus();
</script>
</body>
</html>
