<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Oliver - Tu profesor de inglés</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            color: white;
            padding: 20px 24px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .chat-header p {
            font-size: 0.75rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message { align-self: flex-end; }
        .bot-message { align-self: flex-start; }

        .message-sender {
            font-size: 0.7rem;
            margin-bottom: 4px;
            font-weight: 600;
            color: #64748b;
        }

        .user-message .message-sender { text-align: right; margin-right: 12px; }
        .bot-message .message-sender { margin-left: 12px; }

        .message-bubble {
            padding: 12px 18px;
            border-radius: 24px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .user-message .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message .message-bubble {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .mic-button {
            background: #ef4444;
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4rem;
            transition: all 0.2s;
        }

        .mic-button.recording {
            background: #10b981;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-bar {
            padding: 10px 20px;
            background: #f1f5f9;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
            border-top: 1px solid #e2e8f0;
        }

        .status-bar.listening {
            background: #10b981;
            color: white;
        }

        .header-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 8px;
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        @media (max-width: 600px) {
            .message { max-width: 90%; }
            .mic-button { width: 44px; height: 44px; font-size: 1.2rem; }
            .input-area button { padding: 12px 20px; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🌍 Oliver</h1>
        <p>Habla sin miedo • Aprende a tu ritmo</p>
        <div class="header-buttons">
            <button class="header-btn" id="saveChatBtn">💾 Guardar conversación</button>
            <button class="header-btn" id="loadChatBtn">📂 Cargar conversación</button>
            <button class="header-btn" id="resetBtn">🔄 Nueva conversación</button>
        </div>
    </div>
    <div class="messages-area" id="messagesArea">
        <div class="message bot-message">
            <div class="message-sender">🌍 Oliver</div>
            <div class="message-bubble">
                ¡Hola! Soy Oliver, tu profesor de inglés.<br><br>
                Vamos a aprender de forma natural. No tengas miedo de equivocarte.<br><br>
                Cuéntame, ¿cómo te llamas y de dónde eres?
            </div>
        </div>
    </div>
    <div class="input-area">
        <button class="mic-button" id="micButton">🎤</button>
        <input type="text" id="userInput" placeholder="Escribe o habla en español o inglés..." autocomplete="off">
        <button id="sendBtn">Enviar ✨</button>
    </div>
    <div class="status-bar" id="statusBar">✅ Listo • Habla sin miedo</div>
</div>

<script>
    const API_URL = 'https://profe-ingles.onrender.com/chat';
    const STORAGE_KEY = 'oliver_conversation_history';
    
    const messagesArea = document.getElementById('messagesArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusBar = document.getElementById('statusBar');
    const micButton = document.getElementById('micButton');
    const resetBtn = document.getElementById('resetBtn');
    const saveChatBtn = document.getElementById('saveChatBtn');
    const loadChatBtn = document.getElementById('loadChatBtn');
    
    let conversationHistory = [];
    let isRecording = false;
    let recognition = null;
    
    // ============================================================
    // VOZ
    // ============================================================
    
    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }
    
    function initSpeechRecognition() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            micButton.disabled = true;
            micButton.style.opacity = '0.5';
            return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = false;
        recognition.interimResults = false;
        
        recognition.onstart = () => {
            isRecording = true;
            micButton.classList.add('recording');
            micButton.textContent = '🔴';
            statusBar.textContent = '🎤 Escuchando... Habla ahora';
            statusBar.classList.add('listening');
        };
        
        recognition.onend = () => {
            isRecording = false;
            micButton.classList.remove('recording');
            micButton.textContent = '🎤';
            statusBar.classList.remove('listening');
            statusBar.textContent = '✅ Listo';
        };
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
            statusBar.textContent = `✅ Dijiste: "${transcript}"`;
            setTimeout(() => sendMessage(), 300);
        };
        
        recognition.onerror = (event) => {
            console.error('Error:', event.error);
            statusBar.textContent = `❌ Error del micrófono: ${event.error}`;
            setTimeout(() => { statusBar.textContent = '✅ Listo'; }, 3000);
            isRecording = false;
            micButton.classList.remove('recording');
            micButton.textContent = '🎤';
            statusBar.classList.remove('listening');
        };
        
        micButton.addEventListener('click', () => {
            if (isRecording) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    console.error(e);
                }
            }
        });
    }
    
    // ============================================================
    // CHAT
    // ============================================================
    
    function addMessage(role, text, skipSpeak = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
        const sender = document.createElement('div');
        sender.className = 'message-sender';
        sender.innerText = role === 'user' ? '👤 Tú' : '🌍 Oliver';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerText = text;
        messageDiv.appendChild(sender);
        messageDiv.appendChild(bubble);
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        
        if (role === 'bot' && !skipSpeak) speak(text);
    }
    
    function loadConversationFromStorage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            conversationHistory = JSON.parse(saved);
            messagesArea.innerHTML = '';
            for (const msg of conversationHistory) {
                addMessage(msg.role, msg.content, true);
            }
            statusBar.textContent = '✅ Conversación cargada';
            setTimeout(() => { statusBar.textContent = '✅ Listo • Habla sin miedo'; }, 2000);
        } else {
            statusBar.textContent = '📭 No hay conversación guardada';
            setTimeout(() => { statusBar.textContent = '✅ Listo • Habla sin miedo'; }, 2000);
        }
    }
    
    function saveConversationToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
        statusBar.textContent = '💾 Conversación guardada';
        setTimeout(() => { statusBar.textContent = '✅ Listo • Habla sin miedo'; }, 2000);
    }
    
    let typingIndicator = null;
    function showTyping() {
        if (typingIndicator) return;
        typingIndicator = document.createElement('div');
        typingIndicator.className = 'message bot-message';
        typingIndicator.innerHTML = `<div class="message-sender">🌍 Oliver</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesArea.appendChild(typingIndicator);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function hideTyping() {
        if (typingIndicator) { typingIndicator.remove(); typingIndicator = null; }
    }
    
    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;
        
        sendBtn.disabled = true;
        userInput.disabled = true;
        micButton.disabled = true;
        statusBar.textContent = '🤔 Oliver está pensando...';
        
        addMessage('user', message);
        conversationHistory.push({ role: 'user', content: message });
        userInput.value = '';
        showTyping();
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userMessage: message,
                    conversationHistory: conversationHistory.slice(0, -1)
                })
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            const reply = data.reply || "Oliver está tomando té. ¡Intenta de nuevo!";
            
            hideTyping();
            addMessage('bot', reply);
            conversationHistory.push({ role: 'assistant', content: reply });
            statusBar.textContent = '✅ Listo • Habla sin miedo';
            
            // Auto-guardar después de cada mensaje
            localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
            
        } catch (error) {
            console.error('Error:', error);
            hideTyping();
            addMessage('bot', "Ups, tengo problemas de conexión. Por favor intenta de nuevo.");
            statusBar.textContent = '⚠️ Error de conexión';
        } finally {
            sendBtn.disabled = false;
            userInput.disabled = false;
            micButton.disabled = false;
            userInput.focus();
        }
    }
    
    function resetConversation() {
        conversationHistory = [];
        messagesArea.innerHTML = '';
        localStorage.removeItem(STORAGE_KEY);
        addMessage('bot', '¡Hola! Soy Oliver, tu profesor de inglés. Vamos a aprender de forma natural. No tengas miedo de equivocarte. Cuéntame, ¿cómo te llamas y de dónde eres?', true);
        statusBar.textContent = '✅ Conversación reiniciada';
        setTimeout(() => { statusBar.textContent = '✅ Listo • Habla sin miedo'; }, 2000);
    }
    
    // ============================================================
    // INICIALIZACIÓN
    // ============================================================
    
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    resetBtn.addEventListener('click', resetConversation);
    saveChatBtn.addEventListener('click', saveConversationToStorage);
    loadChatBtn.addEventListener('click', loadConversationFromStorage);
    
    initSpeechRecognition();
    userInput.focus();
    
    // Cargar conversación guardada al iniciar
    loadConversationFromStorage();
</script>
</body>
</html>
