<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Oliver - Con Voz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        .header {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        .header h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
        }
        .user-message {
            justify-content: flex-end;
        }
        .bot-message {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 15px;
        }
        .user-message .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot-message .bubble {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .sender {
            font-size: 11px;
            margin-bottom: 5px;
            margin-left: 10px;
            font-weight: 600;
            color: #64748b;
        }
        .user-message .sender {
            text-align: right;
            margin-right: 10px;
            margin-left: 0;
        }
        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .mic-button {
            background: #ef4444;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mic-button:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
        .mic-button.recording {
            background: #10b981;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .mic-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .text-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        .text-input:focus {
            border-color: #667eea;
        }
        .send-button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .send-button:hover {
            background: #1e3c72;
        }
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            padding: 8px;
            text-align: center;
            font-size: 12px;
            background: #f1f5f9;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
        }
        .status.listening {
            background: #10b981;
            color: white;
        }
        .status.error {
            background: #ef4444;
            color: white;
        }
        @media (max-width: 600px) {
            .bubble {
                max-width: 85%;
            }
            .mic-button {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
            .send-button {
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <h1>
            <span>🇬🇧</span>
            Professor Oliver
            <span>🎤</span>
        </h1>
        <p>Speak or type • Learn English with voice!</p>
    </div>
    <div class="messages" id="messages">
        <div class="message bot-message">
            <div>
                <div class="sender">🇬🇧 Professor Oliver</div>
                <div class="bubble">Hello! I'm Oliver, your British English tutor. Speak or type to me. What's your name? 🇬🇧</div>
            </div>
        </div>
    </div>
    <div class="input-area">
        <button class="mic-button" id="micButton">🎤</button>
        <input type="text" class="text-input" id="messageInput" placeholder="Type your message..." autocomplete="off">
        <button class="send-button" id="sendButton">Send ✨</button>
    </div>
    <div class="status" id="status">✅ Ready • Click the microphone to speak</div>
</div>

<script>
    const API_URL = 'https://profe-ingles.onrender.com/chat';
    
    // Elementos
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const micButton = document.getElementById('micButton');
    const statusDiv = document.getElementById('status');
    
    // Historial
    let conversationHistory = [];
    let isRecording = false;
    let recognition = null;
    
    // Inicializar reconocimiento de voz (Web Speech API)
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-GB'; // Acento británico
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        
        recognition.onstart = () => {
            isRecording = true;
            micButton.classList.add('recording');
            statusDiv.textContent = '🎤 Listening... Speak in English!';
            statusDiv.classList.add('listening');
        };
        
        recognition.onend = () => {
            isRecording = false;
            micButton.classList.remove('recording');
            statusDiv.classList.remove('listening');
            statusDiv.textContent = '✅ Ready • Click the microphone to speak';
        };
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            messageInput.value = transcript;
            statusDiv.textContent = `✅ You said: "${transcript}" • Click Send or press Enter`;
            // Opcional: enviar automáticamente
            // sendMessage();
        };
        
        recognition.onerror = (event) => {
            console.error('Speech recognition error:', event.error);
            statusDiv.textContent = `❌ Microphone error: ${event.error}. Please try again.`;
            statusDiv.classList.add('error');
            setTimeout(() => {
                statusDiv.classList.remove('error');
                statusDiv.textContent = '✅ Ready • Click the microphone to speak';
            }, 3000);
            isRecording = false;
            micButton.classList.remove('recording');
            statusDiv.classList.remove('listening');
        };
        
        micButton.addEventListener('click', () => {
            if (isRecording) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    console.error('Error starting recognition:', e);
                    statusDiv.textContent = '❌ Could not access microphone. Check permissions.';
                }
            }
        });
    } else {
        micButton.disabled = true;
        micButton.style.opacity = '0.5';
        micButton.title = 'Voice recognition not supported in this browser';
        statusDiv.textContent = '⚠️ Voice recognition not supported. Please type your messages.';
    }
    
    function addMessage(role, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
        
        const sender = document.createElement('div');
        sender.className = 'sender';
        sender.textContent = role === 'user' ? '👤 You' : '🇬🇧 Professor Oliver';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        
        messageDiv.appendChild(sender);
        messageDiv.appendChild(bubble);
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;
        
        messageInput.value = '';
        sendButton.disabled = true;
        micButton.disabled = true;
        statusDiv.textContent = '🤔 Professor Oliver is thinking...';
        
        addMessage('user', message);
        conversationHistory.push({ role: 'user', content: message });
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userMessage: message,
                    conversationHistory: conversationHistory.slice(0, -1)
                })
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            const reply = data.reply || "Professor Oliver is having tea. Try again!";
            
            addMessage('bot', reply);
            conversationHistory.push({ role: 'assistant', content: reply });
            
            statusDiv.textContent = '✅ Ready • Click the microphone to speak';
        } catch (error) {
            console.error('Error:', error);
            statusDiv.textContent = '❌ Connection error. Please try again.';
            statusDiv.classList.add('error');
            setTimeout(() => {
                statusDiv.classList.remove('error');
                statusDiv.textContent = '✅ Ready • Click the microphone to speak';
            }, 3000);
        } finally {
            sendButton.disabled = false;
            micButton.disabled = false;
            messageInput.focus();
        }
    }
    
    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    messageInput.focus();
</script>
</body>
</html>
